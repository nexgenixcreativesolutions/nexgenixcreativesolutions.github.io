<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nex Genix | Login & Signup</title>
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
  .animate-field {
    transition: opacity 0.25s ease, transform 0.25s ease, filter 0.25s ease;
  }
  .hidden-field {
    opacity: 0; transform: translateY(-6px); filter: blur(2px);
    pointer-events: none; height: 0; margin: 0; padding: 0; overflow: hidden;
  }
  .visible-field {
    opacity: 1; transform: translateY(0); filter: blur(0);
    pointer-events: auto; height: auto;
  }
  .floating-code-container {
    position: fixed; inset: 0; overflow: hidden;
    pointer-events: none; z-index: 0;
  }
  .code-line {
    position: absolute; white-space: nowrap;
    font-family: 'Courier New', monospace; font-size: 14px;
    color: rgba(57,255,20,0.4);
    text-shadow: 0 0 10px rgba(57,255,20,0.3);
    animation: floatCode linear infinite; opacity: 0;
  }
  @keyframes floatCode {
    0%   { transform: translateX(100vw); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateX(-100%); opacity: 0; }
  }
  @media (min-width: 768px) { .code-line { font-size: 16px; } }
  </style>
</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="bg-zinc-900 border border-green-500 rounded-xl p-6 w-full max-w-md shadow-xl relative z-10">

  <!-- LOGO -->
  <div class="flex justify-center mb-4">
    <img src="assets/images/dashboard-logo-no-bg.png" alt="Nex Genix" class="h-10">
  </div>

  <h2 id="title" class="text-xl font-bold text-center mb-4">Sign In</h2>

  <form id="authForm" class="space-y-3">
    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 bg-transparent border border-zinc-600 rounded focus:border-green-500 outline-none transition" required>

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 bg-transparent border border-zinc-600 rounded focus:border-green-500 outline-none transition" required>

    <!-- Signup-only fields -->
    <div id="signupFields" class="space-y-3 animate-field hidden-field">
      <input id="fullname" type="text" placeholder="Full Name"
        class="w-full p-2 bg-transparent border border-zinc-600 rounded focus:border-green-500 outline-none transition">
      <select id="originSite"
        class="w-full p-2 bg-zinc-800 border border-zinc-600 rounded focus:border-green-500 outline-none transition text-sm">
        <option value="ngcs">I am a Nex Genix Creative Solutions client</option>
        <option value="ngbs">I am a Nex Genix Business School student</option>
      </select>
    </div>

    <button id="submitBtn" type="submit"
      class="w-full bg-green-600 p-2 rounded font-semibold hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
      Continue
    </button>
  </form>

  <p id="msg" class="text-center text-sm mt-3"></p>

  <div class="text-center mt-4 text-sm">
    <span id="toggleText">New here?</span>
    <button id="toggleBtn" class="text-yellow-400 ml-1">Create account</button>
  </div>

  <div class="text-center mt-2 text-sm">
    <button id="forgotBtn" class="text-gray-400 underline">Forgot password?</button>
  </div>

</div>

<script>
/* ── SUPABASE ── */
const SUPABASE_URL  = 'https://rranivozhrsldhapzwqc.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJyYW5pdm96aHJzbGRoYXB6d3FjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxNzIxMzcsImV4cCI6MjA4NTc0ODEzN30.0wOlQErCvNbf9LhhWzecDINB6523BHqgc2G2v0wURGQ';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

/* ── REDIRECT HELPER ── */
// Read ?redirect= param — where to go after successful login
const urlParams   = new URLSearchParams(window.location.search);
const redirectURL = urlParams.get('redirect');

function getPostLoginURL(role, originSite) {
  // If a specific redirect was requested, honour it
  if (redirectURL) return decodeURIComponent(redirectURL);
  // Otherwise route by role / origin
  if (role === 'admin') return 'https://nexgenixcreativesolutions.github.io/admin';
  if (originSite === 'ngbs') return 'https://nexgenixbusinessschool.github.io/ngbs-student-dashboard.html';
  return 'https://nexgenixcreativesolutions.github.io/dashboard';
}

/* ── SESSION CHECK — already logged in? ── */
(async () => {
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    // Fetch profile to determine where to send them
    const { data: profile } = await _sb
      .from('profiles').select('role, origin_site')
      .eq('id', session.user.id).single();
    const dest = getPostLoginURL(
      profile?.role || 'student',
      profile?.origin_site || 'ngcs'
    );
    window.location.href = dest;
  }
})();

/* ── LOADING STATE ── */
const submitBtn = document.getElementById('submitBtn');
function setLoading(on) {
  submitBtn.disabled = on;
  submitBtn.textContent = on ? 'Please wait…' : 'Continue';
}

/* ── MODE TOGGLE ── */
let isSignup = false;
const titleEl      = document.getElementById('title');
const signupFields = document.getElementById('signupFields');
const toggleText   = document.getElementById('toggleText');
const toggleBtn    = document.getElementById('toggleBtn');
const msg          = document.getElementById('msg');

toggleBtn.addEventListener('click', () => {
  isSignup = !isSignup;
  if (isSignup) {
    signupFields.classList.remove('hidden-field');
    signupFields.classList.add('visible-field');
    titleEl.textContent       = 'Create Account';
    toggleText.textContent    = 'Already have an account?';
    toggleBtn.textContent     = 'Sign in';
  } else {
    signupFields.classList.add('hidden-field');
    signupFields.classList.remove('visible-field');
    titleEl.textContent       = 'Sign In';
    toggleText.textContent    = 'New here?';
    toggleBtn.textContent     = 'Create account';
  }
  msg.textContent = '';
});

/* ── AUTH HANDLER ── */
document.getElementById('authForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  msg.textContent = '';
  setLoading(true);

  const email      = document.getElementById('email').value.trim();
  const password   = document.getElementById('password').value.trim();
  const fullName   = document.getElementById('fullname').value.trim();
  const originSite = document.getElementById('originSite').value;

  try {
    if (isSignup) {
      /* ── SIGN UP ── */
      if (!fullName) {
        msg.textContent = 'Please enter your full name.';
        msg.className = 'text-center text-sm mt-3 text-red-400';
        setLoading(false); return;
      }

      const { data, error } = await _sb.auth.signUp({
        email, password,
        options: {
          data: { full_name: fullName, origin_site: originSite },
          emailRedirectTo: getPostLoginURL('student', originSite)
        }
      });

      if (error) throw error;

      if (!data.user) {
        msg.textContent = 'Check your email to confirm your account.';
        msg.className = 'text-center text-sm mt-3 text-yellow-400';
        setLoading(false); return;
      }

      // Profile is auto-created by Supabase trigger (handle_new_user)
      // but we also upsert here to ensure origin_site is set correctly
      await _sb.from('profiles').upsert({
        id:          data.user.id,
        email:       email,
        full_name:   fullName,
        origin_site: originSite,
        role:        'student'
      });

      msg.textContent = 'Account created! Signing you in…';
      msg.className = 'text-center text-sm mt-3 text-green-400';

      // Auto sign-in after signup (email confirm is off during dev)
      const { error: signInErr } = await _sb.auth.signInWithPassword({ email, password });
      if (signInErr) {
        msg.textContent = 'Account created! Please sign in.';
        isSignup = false;
        signupFields.classList.add('hidden-field');
        signupFields.classList.remove('visible-field');
        titleEl.textContent = 'Sign In';
        setLoading(false); return;
      }

      window.location.href = getPostLoginURL('student', originSite);
      return;
    }

    /* ── SIGN IN ── */
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    // Fetch profile for role-based routing
    const { data: profile } = await _sb
      .from('profiles').select('role, origin_site')
      .eq('id', data.user.id).single();

    window.location.href = getPostLoginURL(
      profile?.role || 'student',
      profile?.origin_site || 'ngcs'
    );

  } catch (err) {
    console.error(err);
    msg.textContent = err.message || 'Something went wrong.';
    msg.className = 'text-center text-sm mt-3 text-red-400';
    setLoading(false);
  }
});

/* ── FORGOT PASSWORD ── */
document.getElementById('forgotBtn').addEventListener('click', async () => {
  const email = document.getElementById('email').value.trim();
  if (!email) { alert('Please enter your email first.'); return; }

  const { error } = await _sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://nexgenixcreativesolutions.github.io/login-signup'
  });

  if (error) { alert(error.message); return; }
  alert('Password reset email sent. Check your inbox.');
});

/* ── FLOATING CODE BACKGROUND ── */
const codeSnippets = [
  'const nexgenix = () => {','function createSolution() {',
  'import { Innovation } from "future"','<div className="digital">',
  'async function buildDreams() {','export default Excellence;',
  'return <Success />;','const vision = await design();',
  'npm install creativity','git commit -m "launch"',
  'SELECT * FROM solutions;','CREATE TABLE success;',
  '{ transform: "ideas" }','.future { display: flex; }',
  'onClick={() => innovate()}','useState(creativity);',
  'useEffect(() => grow());','class Digital extends Tech {',
  'interface Vision { }','type Success = Promise<Growth>;'
];
(function createFloatingCodeBackground() {
  const container = document.createElement('div');
  container.className = 'floating-code-container';
  for (let i = 0; i < 15; i++) {
    const line = document.createElement('div');
    line.className = 'code-line';
    line.textContent = codeSnippets[Math.floor(Math.random() * codeSnippets.length)];
    line.style.top              = `${5 + i * 6}%`;
    line.style.animationDuration = `${15 + Math.random() * 10}s`;
    line.style.animationDelay   = `${Math.random() * 20}s`;
    container.appendChild(line);
  }
  document.body.insertBefore(container, document.body.firstChild);
})();
</script>
</body>
</html>
